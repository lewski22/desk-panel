# Mosquitto config — generowany automatycznie przez entrypoint
# NIE edytuj ręcznie — jest nadpisywany przy każdym starcie kontenera
#
# Konfiguracja zarządzana przez zmienne środowiskowe:
#   MQTT_USERNAME      - nazwa użytkownika (domyślnie: backend)
#   MQTT_PASSWORD      - hasło użytkownika
#   ALLOW_ANONYMOUS    - zezwól na anonimowy dostęp (domyślnie: false)
#   REQUIRE_CERTIFICATE - wymagaj certyfikatu TLS (domyślnie: false)
#
# Entrypoint sam generuje mosquitto.conf i plik haseł.
# Ten plik jest tylko fallback / dokumentacja.

listener 1883
allow_anonymous false
password_file /mosquitto/config/passwords

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice
