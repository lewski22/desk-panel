# grafana/provisioning/dashboards/all.yml
apiVersion: 1

providers:
  - name: Reserti
    orgId: 1
    folder: Reserti
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
