# monitoring/docker-compose.yml
# Uruchom: docker compose up -d
# W Coolify: dodaj jako osobny stos lub dołącz do istniejącego docker-compose.yml
#
# Prometheus scrape'uje:
#   - backend:  https://api.prohalw2026.ovh/metrics
#   - gateway:  http://<pi-ip>:9100/metrics  (dodaj wpisy ręcznie)
#
# Grafana dostępna na :3001 (zmień port jeśli kolizja)
# Admin: admin / ${GRAFANA_ADMIN_PASSWORD}

services:
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: reserti-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - '9090:9090'
    networks:
      - monitoring

  grafana:
    build:
      context: ./grafana
      dockerfile: Dockerfile
    image: reserti-grafana:latest
    container_name: reserti-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_SECURITY_ADMIN_USER: admin
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3001}
      GF_ANALYTICS_REPORTING_ENABLED: 'false'
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_SECURITY_ALLOW_EMBEDDING: 'true'
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - '3001:3000'
    depends_on:
      - prometheus
    networks:
      - monitoring

volumes:
  prometheus_data:
  grafana_data:

networks:
  monitoring:
    name: reserti-monitoring
