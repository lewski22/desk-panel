# monitoring/prometheus.yml
#
# Prometheus scrape'uje TYLKO backend NestJS.
# Metryki urządzeń (beacony, gateways) płyną przez backend:
#   - MetricsService.refreshDeviceMetrics() (co 60s) wypełnia gaugi
#     clientBeaconLastSeen, clientBeaconRssi, clientGatewayLastSeen, itp.
# Nie jest wymagane bezpośrednie połączenie Prometheus → Gateway IP.

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    app: reserti

scrape_configs:
  # ── Backend NestJS ─────────────────────────────────────────────
  - job_name: 'reserti-backend'
    scheme: https
    metrics_path: /metrics
    static_configs:
      - targets: ['api.prohalw2026.ovh']
        labels:
          service: backend
    # Jeśli Cloudflare blokuje Prometheus — dodaj Bearer token:
    # authorization:
    #   credentials_file: /etc/prometheus/backend_token
