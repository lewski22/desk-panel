version: '3.9'

services:
  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: desk_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       desk
      POSTGRES_USER:     admin
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d desk"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Mosquitto MQTT broker ────────────────────────────────────
  # Entrypoint generuje mosquitto.conf i plik haseł automatycznie
  # na podstawie zmiennych środowiskowych.
  mosquitto:
    image: eclipse-mosquitto
    container_name: desk_mqtt
    restart: unless-stopped
    environment:
      - MQTT_USERNAME=${MQTT_USERNAME:-backend}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-changeme}
      - REQUIRE_CERTIFICATE=${REQUIRE_CERTIFICATE:-false}
      - ALLOW_ANONYMOUS=${ALLOW_ANONYMOUS:-false}
    entrypoint: >
      sh -c "
        if [ '$$REQUIRE_CERTIFICATE' = 'true' ]; then
          echo 'listener 8883' > /mosquitto/config/mosquitto.conf &&
          echo 'cafile /certs/ca.crt' >> /mosquitto/config/mosquitto.conf &&
          echo 'certfile /certs/server.crt' >> /mosquitto/config/mosquitto.conf &&
          echo 'keyfile  /certs/server.key' >> /mosquitto/config/mosquitto.conf;
        else
          echo 'listener 1883' > /mosquitto/config/mosquitto.conf;
        fi &&
        echo 'require_certificate '$$REQUIRE_CERTIFICATE >> /mosquitto/config/mosquitto.conf &&
        echo 'allow_anonymous '$$ALLOW_ANONYMOUS >> /mosquitto/config/mosquitto.conf &&
        if [ -n '$$MQTT_USERNAME' ] && [ -n '$$MQTT_PASSWORD' ]; then
          echo 'password_file /mosquitto/config/passwords' >> /mosquitto/config/mosquitto.conf &&
          rm -f /mosquitto/config/passwords &&
          touch /mosquitto/config/passwords &&
          chmod 0700 /mosquitto/config/passwords &&
          chown root:root /mosquitto/config/passwords &&
          mosquitto_passwd -b -c /mosquitto/config/passwords $$MQTT_USERNAME $$MQTT_PASSWORD &&
          chown mosquitto:mosquitto /mosquitto/config/passwords;
        fi &&
        exec mosquitto -c /mosquitto/config/mosquitto.conf
      "
    volumes:
      - mosquitto_config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
    # Port 1883 NIE jest wystawiony publicznie — broker dostępny tylko przez sieć Docker.
    # Backend łączy się przez: mqtt://mosquitto:1883 (sieć wewnętrzna Compose).
    # Expose jedynie dla kontenerów w tej samej sieci:
    expose:
      - "1883"
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── NestJS Backend ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: desk_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL:    postgresql://admin:admin@postgres:5432/desk
      MQTT_BROKER_URL: mqtt://mosquitto:1883
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  mosquitto_config:
  mosquitto_data:
