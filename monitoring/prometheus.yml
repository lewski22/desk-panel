# monitoring/prometheus.yml

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    app: reserti

scrape_configs:
  # ── Backend NestJS ─────────────────────────────────────────────
  - job_name: 'reserti-backend'
    scheme: https
    metrics_path: /metrics
    static_configs:
      - targets: ['api.prohalw2026.ovh']
        labels:
          service: backend
    # Jeśli Cloudflare blokuje Prometheus — dodaj Bearer token
    # authorization:
    #   credentials_file: /etc/prometheus/backend_token

  # ── Gateway Python ─────────────────────────────────────────────
  # Dodaj po jednym wpisie per gateway (IP z sieci lokalnej lub VPN)
  - job_name: 'reserti-gateway'
    static_configs:
      - targets:
          - '192.168.1.100:9100'   # <- zmień na IP RPi
        labels:
          service: gateway
          location: office-main
      # - targets:
      #     - '192.168.1.101:9100'
      #   labels:
      #     service: gateway
      #     location: office-branch
    relabel_configs:
      - source_labels: [__address__]
        regex: '([^:]+):\d+'
        target_label: gateway_ip
        replacement: '$1'
