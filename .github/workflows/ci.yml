name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Lint + TypeScript ─────────────────────────────────────────
  typecheck:
    name: Lint & TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint -- --max-warnings=0

  # ── Docker build ──────────────────────────────────────────────
  # Weryfikuje że Dockerfile buduje się poprawnie.
  # Nie pushuje obrazu — deploy przez Coolify po merge do main.
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: typecheck

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/backend/Dockerfile
          push: false
          # Cache między runami — przyspiesza kolejne buildy
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          tags: desk-panel-backend:ci
